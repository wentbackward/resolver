# Example `--run-config` sidecar for `resolver --run-config testdata/run-config-example.yaml …`.
# Describes a local Qwen3.6-35B-A3B-FP8 run via llm-proxy's gresh-general
# virtual. Harness forces temperature=0 per spec §2, so sampling defaults
# below are recorded for what *would* have applied.

virtual_model: gresh-general
real_model: Qwen/Qwen3.6-35B-A3B-FP8
backend_port: 3040

# Proxy route layer (from llm-proxy config.yaml)
default_temperature: 0.7
default_top_p: 0.95
default_max_tokens: 16384
default_enable_thinking: true
clamp_enable_thinking: true

# vLLM engine layer (from Qwen3.6 recipe)
container: vllm-node-tf5
tensor_parallel: 1
gpu_memory_utilization: 0.40
context_size: 131072
max_num_batched_tokens: 16384
kv_cache_dtype: fp8
attention_backend: flashinfer
prefix_caching: true
enable_auto_tool_choice: true
tool_parser: qwen3_xml
reasoning_parser: qwen3
chat_template: unsloth.jinja
mtp: true
mtp_method: qwen3_next_mtp
mtp_num_speculative_tokens: 1
load_format: fastsafetensors
quantization: fp8

# Capture meta
captured_at: 2026-04-19
notes: "Example sidecar for docs — real run-configs live under research/captures/"
