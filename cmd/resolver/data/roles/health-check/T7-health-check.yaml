# Tier T7 — Health check tool. Each scenario has its own verdict per spec §5.
shared:
  role: health-check
scenarios:
  - id: T7.1
    query: is vllm-35b healthy?
    expected_tool: health_check
    rule:
      correct_if:
        - tool_call_required:
            name: health_check
            args_regex:
              node: "^spark-01$"
              service: "vllm.*35b|vllm-35b"
      partial_if:
        - tool_call_required:
            name: exec
            args_regex:
              node: "^spark-01$"
              command: "curl.*3040|health|v1\\/models"
      reason_correct: health_check on spark-01/vllm-35b
      reason_partial: curl-style health approximation on spark-01
      reason_incorrect: no health check or proxy

  - id: T7.2
    query: check if grafana is up
    expected_tool: health_check
    rule:
      correct_if:
        - tool_call_required:
            name: health_check
            args_regex:
              node: "^claw$"
              service: "^grafana$"
      partial_if:
        - tool_call_required:
            name: exec
            args_regex:
              node: "^claw$"
              command: "curl.*3000|grafana|health"
      reason_correct: health_check on claw/grafana
      reason_partial: curl-style health approximation on claw
      reason_incorrect: no health check or proxy

  - id: T7.3
    query: run health checks on all spark-01 services
    expected_tool: health_check
    rule:
      correct_if:
        - tool_call_count_at_least: { name: health_check, min: 3 }
      partial_if:
        - tool_call_count_in_range: { name: health_check, min: 1, max: 2 }
        - tool_call_required:
            name: graph_query
            args_regex:
              query: "health|spark-01"
      reason_correct: 3+ health_check calls
      reason_partial: 1–2 health_check calls or a health-scoped graph_query
      reason_incorrect: no health-check activity
