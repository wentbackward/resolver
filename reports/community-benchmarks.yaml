# Community benchmark reference data joined into the v2 aggregator.
#
# APPEND-ONLY FILE: historical rows must not change (a score reported on a
# specific date is immutable — a new eval produces a new row with a newer
# `as_of`, it does not overwrite the old one). The aggregator's
# `community_benchmarks` table is truncate-and-reloaded from this file
# each run — the table is a derived mirror, this file is canonical.
#
# Schema + contribution workflow: docs/community-benchmarks-schema.md
# AI-driven refresh protocol:       docs/prompts/scrape-community-benchmarks.md
#
# ==================================================================
# SEED DATA NOTICE
# ==================================================================
# The 21 rows below seed the aggregator + analyzer with enough data to
# demonstrate the join shape. Values are best-effort known numbers as of
# April 2026; every row's `notes` field carries a "seed — verify via
# <source_url>" marker. Before citing these externally:
#
#   1. Follow the URL.
#   2. Confirm the number still matches (or append a newer row with
#      today's `as_of`).
#   3. Remove the "seed — verify" note so downstream tooling knows the
#      row is operator-confirmed.
#
# ==================================================================

