name: Go

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'CITATION.cff'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'CITATION.cff'
      - '.gitignore'

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }}, CGO-free, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        go: ['1.24']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify tidy
        run: |
          go mod download
          go mod verify

      - name: Vet (default)
        run: go vet ./...

      - name: Test (default)
        run: go test -count=1 ./...

      - name: Build (default, pure-Go)
        run: go build -o /tmp/resolver ./cmd/resolver

  test-duckdb:
    name: Test (Go 1.24, -tags duckdb, CGO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Vet (duckdb)
        run: go vet -tags duckdb ./...

      - name: Test (duckdb)
        run: go test -tags duckdb -count=1 ./...

      - name: Build (duckdb)
        run: go build -tags duckdb -o /tmp/resolver-duckdb ./cmd/resolver

  test-python-analyzer:
    name: Test (Python analyzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install analyzer + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e 'tools/analyze[test]'

      - name: Pytest
        run: pytest tools/analyze/tests -v

      - name: pip-audit (non-blocking)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --strict

  vulncheck-go:
    name: govulncheck (default + duckdb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck (default, pure-Go)
        continue-on-error: true
        run: govulncheck ./...

      - name: govulncheck (-tags duckdb)
        continue-on-error: true
        run: govulncheck -tags duckdb ./...
