name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }}, CGO-free)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        go: ['1.24']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify tidy
        run: |
          go mod download
          go mod verify

      - name: Vet (default)
        run: go vet ./...

      - name: Test (default)
        run: go test -count=1 ./...

      - name: Build (default, pure-Go)
        run: go build -o /tmp/resolver ./cmd/resolver

  test-duckdb:
    name: Test (Go 1.24, -tags duckdb, CGO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Vet (duckdb)
        run: go vet -tags duckdb ./...

      - name: Test (duckdb)
        run: go test -tags duckdb -count=1 ./...

      - name: Build (duckdb)
        run: go build -tags duckdb -o /tmp/resolver-duckdb ./cmd/resolver

  test-python-analyzer:
    name: Test (Python analyzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install analyzer + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e 'tools/analyze[test]'

      - name: Pytest
        run: pytest tools/analyze/tests -v
