# Captured config for gresh-general-3.5 — backed by Qwen_Qwen3.5-35B-A3B-FP8 at capture time.
# Harness sends temperature=0 per spec §2, so the sampling defaults below are
# what the llm-proxy *would* have applied had the client not overridden.
# enable_thinking is clamped by the route, so the harness cannot unset it.

virtual_model: gresh-general-3.5
real_model: Qwen/Qwen3.5-35B-A3B-FP8
backend_port: 3041
captured_at: 2026-04-20

# Proxy route layer (from llm-proxy config.yaml)
default_temperature: 1.0
default_top_p: 0.95
default_top_k: 20
default_presence_penalty: 1.5

default_max_tokens: 16384
default_enable_thinking: true
clamp_enable_thinking: true

# vLLM engine layer (from recipe)
container: vllm-node
tensor_parallel: 1
gpu_memory_utilization: 0.45
context_size: 131072
max_num_batched_tokens: 16384
kv_cache_dtype: fp8
attention_backend: flashinfer
prefix_caching: true
enable_auto_tool_choice: true
tool_parser: qwen_coder
reasoning_parser: qwen3
chat_template: unsloth.jinja
mtp: true
mtp_method: mtp
mtp_num_speculative_tokens: 1
load_format: fastsafetensors
quantization: fp8
env_VLLM_MARLIN_USE_ATOMIC_ADD: "1"

notes: "route rebalanced 2026-04-20 (temp 0.7 -> 1.0, +top_k 20, +presence_penalty 1.5); vLLM tool_parser qwen3_xml -> qwen_coder"
