# Captured config for gresh-coder — backed by Qwen_Qwen3.6-35B-A3B-FP8 at capture time.
# vLLM MTP disabled; proxy route tuned for precise coding (thinking on, low presence_penalty).

virtual_model: gresh-coder
real_model: Qwen/Qwen3.6-35B-A3B-FP8
backend_port: 3040
captured_at: 2026-04-21

# Proxy route layer
default_temperature: 0.6
default_top_p: 0.95
default_top_k: 20
default_min_p: 0.05
default_presence_penalty: 0.0

default_max_tokens: 16384
default_enable_thinking: true
clamp_enable_thinking: true

# vLLM engine layer (MTP OFF)
container: vllm-node-tf5
tensor_parallel: 1
gpu_memory_utilization: 0.40
context_size: 131072
max_num_batched_tokens: 16384
kv_cache_dtype: fp8
attention_backend: flashinfer
prefix_caching: true
enable_auto_tool_choice: true
tool_parser: qwen_coder
reasoning_parser: qwen3
chat_template: unsloth.jinja
mtp: false
load_format: fastsafetensors
quantization: fp8

notes: "coder preset; thinking on; presence_penalty clamped to 0.0; repetition_penalty=1.05 applied by proxy (not in sidecar schema); vLLM MTP disabled"
