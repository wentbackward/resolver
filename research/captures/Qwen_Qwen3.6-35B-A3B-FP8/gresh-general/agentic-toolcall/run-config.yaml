# Captured config for gresh-general — backed by Qwen_Qwen3.6-35B-A3B-FP8 at capture time.
# vLLM MTP disabled; proxy route re-tuned 2026-04-21 for low-temperature non-thinking baseline.

virtual_model: gresh-general
real_model: Qwen/Qwen3.6-35B-A3B-FP8
backend_port: 3040
captured_at: 2026-04-21

# Proxy route layer (from llm-proxy config.yaml)
default_temperature: 0.3
default_top_p: 0.9
default_min_p: 0.05
default_presence_penalty: 0.1

default_max_tokens: 4096
default_enable_thinking: false
clamp_enable_thinking: true

# vLLM engine layer (MTP OFF in current recipe)
container: vllm-node-tf5
tensor_parallel: 1
gpu_memory_utilization: 0.40
context_size: 131072
max_num_batched_tokens: 16384
kv_cache_dtype: fp8
attention_backend: flashinfer
prefix_caching: true
enable_auto_tool_choice: true
tool_parser: qwen_coder
reasoning_parser: qwen3
chat_template: unsloth.jinja
mtp: false
load_format: fastsafetensors
quantization: fp8

notes: "route re-tuned 2026-04-21 (temp 1.0→0.3, top_p 0.95→0.9, +min_p 0.05, presence_penalty 1.5→0.1, max_tokens 16384→4096, thinking OFF); vLLM MTP disabled; repetition_penalty=1.1 applied by proxy (not in sidecar schema)"
